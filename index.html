<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cà phê Sơn La</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --brown-dark: #5d4037;
            --brown-medium: #8d6e63;
            --green-main: #27ae60;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* --- TRANG CHỦ --- */
        .top-bar { background: var(--brown-dark); color: white; display: flex; justify-content: space-between; padding: 8px 5%; font-size: 13px; }
        .auth-links span { cursor: pointer; text-decoration: underline; }
        
        nav { background: var(--brown-medium); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; list-style: none; padding: 0; margin: 0; gap: 20px; color: white; }
        .nav-links li.active { background: #c6a086; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        
        .hero { 
            height: 450px; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200') center/cover; 
            display: flex; justify-content: center; align-items: center; color: white; text-align: center; border-bottom: 8px solid var(--brown-dark); 
        }
        .hero h1 { font-size: 3.5rem; margin: 0; letter-spacing: 4px; text-transform: uppercase; }

        /* --- ĐĂNG NHẬP (HÌNH 32) --- */
        #login-screen { 
            height: 100vh; 
            background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1200') center/cover; 
            display: flex; justify-content: center; align-items: center; 
        }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 8px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .back-home { color: #888; font-size: 13px; cursor: pointer; margin-bottom: 20px; display: block; text-align: left; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: var(--green-main); }
        .input-group input { width: 100%; padding: 10px 10px 10px 40px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; outline: none; }
        .btn-green { background: var(--green-main); color: white; border: none; width: 100%; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 16px; }
        .btn-green:hover { background: #219150; }

        footer { background: var(--brown-dark); color: white; text-align: center; padding: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <section id="home-screen">
        <div class="top-bar">
            <div>Chào mừng bạn đến với Cà phê Sơn La!</div>
            <div class="auth-links">
                <span onclick="navTo('login-screen')">Đăng nhập</span>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li class="active">Trang chủ</li>
                <li>Giới thiệu</li>
                <li>Sản phẩm</li>
                <li>Dịch vụ</li>
                <li>Liên hệ</li>
            </ul>
            <div style="color: white;"><i class="fas fa-search"></i> <i class="fas fa-shopping-cart" style="margin-left:15px;"></i> 0</div>
        </nav>
        <div class="hero">
            <div class="hero-content">
                <h1>CÀ PHÊ SƠN LA</h1>
                <p>Hương vị nơi tình yêu bắt đầu</p>
            </div>
        </div>
        <footer>© 2025 Flourcafe. All Rights Reserved. Được thành lập vào năm 2025</footer>
    </section>

    <section id="login-screen" class="hidden">
        <div class="login-card">
            <span class="back-home" onclick="navTo('home-screen')"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</span>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Email or Phone">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password">
            </div>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <a href="#" style="color: var(--green-main); font-size: 12px; text-decoration: none;">Forgot password?</a>
            </div>
            
            <button class="btn-green" onclick="handleLogin()">Login</button>
        </div>
    </section>

    <script>
        function navTo(screenId) {
            // Ẩn tất cả màn hình
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.add('hidden');
            
            // Hiện màn hình đích
            document.getElementById(screenId).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function handleLogin() {
            // Mô phỏng đăng nhập thành công và quay lại trang chủ
            alert("Đăng nhập thành công!");
            navTo('home-screen');
        }
    </script>
</body>
</html>
